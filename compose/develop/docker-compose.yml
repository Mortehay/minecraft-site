services:
  # Vite / React Frontend
  next-app:
    command: /bin/sh -c "npm install && (npm run dev || tail -f /dev/null)"
    build:
      context: ../../src
      dockerfile: ../compose/develop/next-app/Dockerfile
      target: base
    ports:
      - "13000:3000"
    environment:
      # --- Supabase (auth + storage) ---------------------------------
      # For local dev you can keep using your Supabase cloud project
      # OR point to a self-hosted Supabase stack if you set one up.
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_SUPABASE_PASSWORD=${VITE_SUPABASE_PASSWORD}
      # --- App config ------------------------------------------------
      - VITE_ADMIN_EMAIL=${ADMIN_EMAIL}
      # --- Local DB (for custom app data beyond Supabase auth) -------
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-password}@db:5432/postgres
    volumes:
      - ../../src:/app
      - node_modules:/app/node_modules
    depends_on:
      - db
      - mailhog

  # ────────────────────────────────────────────────────────────────────
  # Local PostgreSQL  (app data / mirrors your Supabase schema for dev)
  # In production this role is replaced entirely by Supabase cloud.
  # ────────────────────────────────────────────────────────────────────
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Mount init SQL so the schema is auto-created on first start
      - ./db/init.sql:/docker-entrypoint-initdb.d/z-init.sql:ro
    command: 
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/postgresql/server.crt"
      - "-c"
      - "ssl_key_file=/etc/postgresql/server.key"
      - "-h"
      - "0.0.0.0"


  # ────────────────────────────────────────────────────────────────────
  # MailHog  –  catches ALL outgoing emails in local dev
  # Web UI:  http://localhost:8025
  # SMTP:    localhost:1025
  # ────────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "11025:1025" # SMTP
      - "18025:8025" # Web UI

volumes:
  db_data:
  node_modules:
